<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Costing System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #1e3a4f;
            --accent: #2c6e4f;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a4f 100%);
            color: white;
            min-height: 100vh;
        }
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 700px;
        }
        h1 {
            font-size: 3.2rem;
            margin-bottom: 16px;
            font-weight: 700;
        }
        p {
            font-size: 1.25rem;
            margin-bottom: 40px;
            opacity: 0.9;
        }
        .btn {
            display: inline-block;
            padding: 16px 36px;
            margin: 10px;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            font-size: 1.1rem;
            transition: all 0.3s;
        }
        .btn-login {
            background: white;
            color: var(--primary);
        }
        .btn-register {
            background: transparent;
            color: white;
            border: 2px solid white;
        }
        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 25px rgba(0,0,0,0.2);
        }
        .features {
            margin-top: 60px;
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }
        .feature {
            text-align: center;
            max-width: 180px;
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="container">
            <h1><i class="fas fa-hotel"></i> Hotel Daily Costing</h1>
            <p>Professional daily costing & profit tracking system for hotels and restaurants</p>
            
            <div>
                <a href="{% url 'login' %}" class="btn btn-login">
                    <i class="fas fa-sign-in-alt"></i> Login
                </a>
                <a href="{% url 'register' %}" class="btn btn-register">
                    <i class="fas fa-user-plus"></i> Create Account
                </a>
            </div>

            <div class="features">
                <div class="feature">
                    <i class="fas fa-chart-line fa-2x" style="color:#4ade80; margin-bottom:12px;"></i>
                    <h4>Real-time Tracking</h4>
                </div>
                <div class="feature">
                    <i class="fas fa-users fa-2x" style="color:#60a5fa; margin-bottom:12px;"></i>
                    <h4>Multi-User Support</h4>
                </div>
                <div class="feature">
                    <i class="fas fa-file-invoice-dollar fa-2x" style="color:#facc15; margin-bottom:12px;"></i>
                    <h4>Profit Analysis</h4>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
